# Ruff configuration — Python linter and formatter
# https://docs.astral.sh/ruff/configuration/

# Target Python 3.12+
target-version = "py312"

# Line length matching common Python style
line-length = 120

# Source directories
src = ["app"]

# Exclude patterns
exclude = [
    ".git",
    "__pycache__",
    "*.egg-info",
    "venv",
    ".venv",
    "harness",
    "alembic",
]

[lint]
# Enable rule groups
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
]

# Ignore specific rules that are too noisy for this codebase
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (FastAPI Depends pattern)
    "SIM108", # ternary operator (reduces readability in some cases)
    "RUF012", # mutable class attributes (SQLModel pattern)
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

[lint.isort]
known-first-party = ["app"]

[format]
# Use double quotes for strings
quote-style = "double"

# Use spaces for indentation
indent-style = "space"
